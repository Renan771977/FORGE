<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FORGE Core — Software</title>
  <link rel="icon" type="image/png" href="/img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/global.css">
  <!-- ATENCAO: /css/pages/software.css NAO EXISTE na sua pasta public/css/pages/.
       Crie o arquivo e descomente a linha abaixo. Ate la, a pagina usa so o global. -->
  <!-- <link rel="stylesheet" href="/css/pages/software.css"> -->
</head>
<body>

<div class="global-grid-bg" aria-hidden="true"></div>

<header>
  <nav class="site-nav" aria-label="Navegação principal">
    <a class="nav-logo" href="/"><span class="nav-logo__text">FORGE</span></a>
    <ul class="nav-links" role="list">
      <a class="nav-links__item" href="/vendas">Builds</a>
      <a class="nav-links__item" href="/configurador">Configurador</a>
      <a class="nav-links__item" href="/benchmark">Benchmark</a>
      <a class="nav-links__item active" href="/software">Software</a>
      <a class="nav-links__item" href="/consultoria">Consultoria</a>
    </ul>
    <div class="nav-auth-container">
      <button class="btn-primary" onclick="window.location.href='/cadastro'">Minha Conta</button>
    </div>
  </nav>
</header>

<main id="main-content">
  <section id="software" class="active" aria-labelledby="software-heading" style="display: block;">
    <div class="software-wrap">
      <header class="sec-header software__header">
        <p class="sec-header__eyebrow">Forge Core · Desktop</p>
        <h2 id="software-heading" class="sec-header__title">O controle absoluto<br>da sua máquina.</h2>
        <p class="sec-header__sub">Telemetria de hardware em baixa latência e detecção de gargalos em tempo real.</p>
      </header>

      <div class="software__grid">
        <div class="software__features">
          <div class="software-score">
            <span class="software-score__label">FORGE Score</span>
            <p class="software-score__value">9<span>.4</span></p>
          </div>
          <div class="software__cta-wrap">
            <a class="btn-primary software__cta" href="#" aria-label="Baixar Forge Core para Windows">
              Baixar Forge Core (Windows)
            </a>
            <p class="software__cta-meta">Windows 10/11 · 64-bit · v1.0</p>
          </div>
        </div>

        <figure class="software__mockup" aria-label="Prévia do painel do Forge Core">
          <div class="app-window">
             <div class="app-dashboard">
                <div class="app-score-ring__inner"><span class="app-score-ring__value">9.4</span></div>
             </div>
          </div>
        </figure>
      </div>
    </div>
  </section>
</main>

<footer id="main-footer">
  <div class="footer-grid">
    <div class="footer-brand"><p class="brand-name">FORGE</p></div>
  </div>
</footer>

<script src="/js/api.js"></script>
<script src="/js/global.js"></script>
<!-- ATENCAO: /js/software.js NAO EXISTE. Removido para nao dar 404.
     Se criar o arquivo, coloque em public/js/pages/software.js e use:
     <script src="/js/pages/software.js"></script> -->
</body>
</html>
